# Build on push to main and publish dist/ to the gh-pages branch.
# GitHub Pages should be configured to deploy from the gh-pages branch (root).
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

# Need contents: write so the workflow can push to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
